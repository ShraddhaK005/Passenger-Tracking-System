{% extends "base.html" %}
{% block title %}Login - Passenger Tracking{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
  <div class="w-full max-w-sm bg-white/90 backdrop-blur shadow-xl rounded-2xl p-8 border border-slate-200">
    <h2 class="text-xl font-semibold mb-2 text-center text-slate-900">
      Staff Login
    </h2>
    <p class="text-xs text-slate-500 mb-6 text-center">
      Secure access to airport passenger tracking console.
    </p>

    <form method="post" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Username</label>
        <input
          type="text"
          name="username"
          class="w-full px-3 py-2 rounded-md border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-slate-900"
          required
        />
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Password</label>
        <input
          type="password"
          name="password"
          class="w-full px-3 py-2 rounded-md border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-slate-900"
          required
        />
      </div>

      <button
        type="submit"
        class="w-full mt-2 py-2.5 rounded-md bg-slate-900 text-white text-sm font-semibold hover:bg-slate-800 active:bg-black transition"
      >
        Sign in
      </button>
    </form>

  </div>
</div>
{% endblock %}
